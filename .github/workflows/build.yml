name: Build Android APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate debug keystore and signing config
        run: |
          keytool -genkeypair -v \
            -keystore key.jks \
            -storetype JKS \
            -alias debug \
            -keyalg RSA \
            -keysize 2048 \
            -validity 365 \
            -storepass android \
            -keypass android \
            -dname "CN=Debug, O=Debug, C=US"
          printf 'KEYSTORE_FILE=key.jks\nKEYSTORE_PASSWORD=androi...\n' > signing.properties

      - name: Build Debug APK
        run: ./gradlew :manager:assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: shizuku-manager-debug
          path: manager/build/outputs/apk/debug/manager-debug.apk
          if-no-files-found: warn
