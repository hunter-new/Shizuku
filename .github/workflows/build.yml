name: Build Android APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Accept Android SDK licenses and install NDK
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;29.0.13113456"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create debug keystore and signing.properties
        run: |
          KEYSTORE_PATH="$GITHUB_WORKSPACE/debug.keystore"
          keytool -genkeypair \
            -keystore "$KEYSTORE_PATH" \
            -storetype JKS \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -J-Dkeystore.pkcs12.legacy
          echo "KEYSTORE_FILE=$KEYSTORE_PATH" > "$GITHUB_WORKSPACE/signing.properties"
          echo "KEYSTORE_PASSWORD=android" >> "$GITHUB_WORKSPACE/signing.properties"
          echo "KEYSTORE_ALIAS=androiddebugkey" >> "$GITHUB_WORKSPACE/signing.properties"
          echo "KEYSTORE_ALIAS_PASSWORD=android" >> "$GITHUB_WORKSPACE/signing.properties"
          echo "=== signing.properties ==="
          cat "$GITHUB_WORKSPACE/signing.properties"
          echo "=== keystore ==="
          ls -la "$KEYSTORE_PATH"

      - name: Build Debug APK
        run: ./gradlew :manager:assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: shizuku-manager-debug
          path: manager/build/outputs/apk/debug/manager-debug.apk
          if-no-files-found: warn
