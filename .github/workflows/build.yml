name: Build Android APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Accept Android SDK licenses and install NDK
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;29.0.13113456"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: true

      - name: Create debug keystore
        run: bash .github/scripts/make-signing.sh

      - name: Build Debug APK
        run: ./gradlew :manager:assembleDebug --no-daemon --no-build-cache

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: shizuku-manager-debug
          path: manager/build/outputs/apk/debug/manager-debug.apk
          if-no-files-found: warn

      - name: Upload build reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            build/reports/
            /home/runner/work/_temp/.gradle-actions/
          if-no-files-found: ignore
