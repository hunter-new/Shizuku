name: Build Android APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Accept Android SDK licenses and install NDK
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;29.0.13113456"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create signing config (use Android debug keystore)
        run: |
          # Ensure the default Android debug keystore exists
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkeypair \
              -keystore ~/.android/debug.keystore \
              -storetype JKS \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass android \
              -keypass android \
              -dname "CN=Android Debug,O=Android,C=US" \
              -J-Dkeystore.pkcs12.legacy
          fi
          printf 'KEYSTORE_FILE=%s\nKEYSTORE_PASSWORD=android\nKEYSTORE_ALIAS=androiddebugkey\nKEYSTORE_ALIAS_PASSWORD=android\n' \
            "$HOME/.android/debug.keystore" > signing.properties

      - name: Build Debug APK
        run: ./gradlew :manager:assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: shizuku-manager-debug
          path: manager/build/outputs/apk/debug/manager-debug.apk
          if-no-files-found: warn
