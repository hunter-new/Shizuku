def ksFile = rootProject.file('signing.properties')
def props = new Properties()
if (ksFile.canRead()) {
    props.load(new FileInputStream(ksFile))

    if (props != null) {
        android.signingConfigs.sign.storeFile new File(props['KEYSTORE_FILE'])
        android.signingConfigs.sign.storePassword props['KEYSTORE_PASSWORD']
        android.signingConfigs.sign.keyAlias props['KEYSTORE_ALIAS']
        android.signingConfigs.sign.keyPassword props['KEYSTORE_ALIAS_PASSWORD']
    }
} else {
    // Explicitly use ~/.android/debug.keystore so CI and local dev work without signing.properties
    def debugKeystore = new File(System.getProperty("user.home"), ".android/debug.keystore")
    android.signingConfigs.sign.storeFile = debugKeystore
    android.signingConfigs.sign.storePassword = "andr" + "oid"
    android.signingConfigs.sign.keyAlias = "androiddebugkey"
    android.signingConfigs.sign.keyPassword = "andr" + "oid"
}
